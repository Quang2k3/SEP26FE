services:
  # Next.js Frontend
  frontend:
    build: .
    image: ghcr.io/quang2k3/sep26fe:latest
    container_name: sep26fe
    restart: unless-stopped
    ports:
      - "3000:3000"

  # Auto-update: polls GHCR every 60s for new images
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Docker config for GHCR authentication
      - ~/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_INCLUDE_STOPPED=true
      - DOCKER_CONFIG=/
    command: sep26fe

  # NOTE: Cloudflare Tunnel (wms-tunnel) is already running as a Windows service.
  # Add a public hostname in Cloudflare dashboard: https://one.dash.cloudflare.com/
  #   - Domain: cleanhousewms.id.vn -> http://localhost:3000
